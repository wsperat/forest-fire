---
name: Python Verify
on:
  pull_request:
  workflow_dispatch:
jobs:
  python-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Show versions
        run: |
          python --version
          uv --version
          cargo --version
      - name: Sync Python dependencies
        run: uv sync --all-extras
      - name: Lock file check
        run: uv lock --locked
      - name: isort (check only)
        run: >-
          uv run isort --check-only
          bindings/python/python/forestfire/_core.pyi
          examples/python/showcase.py
          tests/python/test_train.py
          tests/python/test_sklearn_wrappers.py
      - name: Ruff lint
        run: >-
          uv run ruff check --output-format=github
          bindings/python
          examples/python
          tests/python
      - name: Ruff formatting (check only)
        run: >-
          uv run ruff format --check
          bindings/python/python/forestfire/_core.pyi
          examples/python/showcase.py
          tests/python/test_train.py
          tests/python/test_sklearn_wrappers.py
      - name: yamllint
        run: >-
          uv run yamllint
          Taskfile.yaml
          .pre-commit-config.yaml
          .github/workflows
      - name: mypy
        run: >-
          uv run --with mypy mypy . --check-untyped-defs --strict
          --config-file pyproject.toml
      - name: Build Python extension
        run: uv run maturin develop -m bindings/python/Cargo.toml
      - name: pytest
        run: >-
          uv run pytest -q
          tests/python/test_train.py
          tests/python/test_sklearn_wrappers.py
      - name: Run Python examples
        run: uv run python examples/python/showcase.py
