---
version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  venv:
    desc: Create virtual environment
    cmds:
      - uv venv --python=$(cat .python-version) --seed --allow-existing

  install:
    desc: Install dependencies
    cmds:
      - uv sync --all-extras

  lint-check-only:
    desc: Check linting and formatting (no fixes)
    cmds:
      - uv run isort --check-only .
      - uv run ruff check .
      - uv run ruff format --check .
      - uv run --with yamllint yamllint .

  lint:
    desc: Auto-fix linting and formatting issues
    cmds:
      - uv run isort .
      - uv run ruff check --fix .
      - uv run ruff format .
      - uv run --with yamllint yamllint .

  mypy:
    desc: Run static type checks with mypy
    deps: [install]
    cmds:
      - uv run --with mypy mypy . --check-untyped-defs --strict --config-file pyproject.toml

  setup-local-env:
    desc: Setup local environment
    cmds:
      - task venv
      - task install
      - uv run --with pre-commit pre-commit install

  clean:
    desc: Clean cache and temporary files
    cmds:
      - rm -rf .mypy_cache .pytest_cache .ruff_cache
      - find . -regex ".*/__pycache__" -exec rm -rf {} +
      - uv run --with pre-commit pre-commit clean || true
      - cargo clean -p forestfire-python

  test:
    desc: Run Python tests
    deps: [install]
    cmds:
      - uv run pytest

  lock-check:
    desc: Verify lock file is up-to-date
    cmds:
      - uv lock --locked

  check:
    desc: Run Python checks and tests
    deps: [install]
    cmds:
      - task lock-check
      - task lint-check-only
      - task mypy
      - task test

  rust-toolchain:
    desc: Ensure Rust toolchain and components (rustfmt, clippy)
    cmds:
      - |
        if ! command -v rustup >/dev/null 2>&1; then
          echo "rustup is required. Install from https://rustup.rs"; exit 1;
        fi
      - rustup show active-toolchain || true
      - rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - rustup component add rustfmt clippy --toolchain stable

  rust-fmt:
    desc: Format Rust code with rustfmt
    deps: [rust-toolchain]
    cmds:
      - cargo fmt --all

  rust-fmt-check:
    desc: Check Rust formatting (no changes)
    deps: [rust-toolchain]
    cmds:
      - cargo fmt --all -- --check

  rust-lint:
    desc: Run Clippy (deny warnings)
    deps: [rust-toolchain]
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-build:
    desc: Build all Rust workspace targets
    deps: [rust-toolchain]
    cmds:
      - cargo build --workspace --all-targets

  rust-test:
    desc: Run all Rust tests
    deps: [rust-toolchain]
    cmds:
      - cargo test --workspace --all-targets

  rust-check:
    desc: Cargo check (type-check only)
    deps: [rust-toolchain]
    cmds:
      - cargo check --workspace --all-targets

  rust-clean:
    desc: Clean Rust build artifacts
    cmds:
      - cargo clean

  rust-verify:
    desc: Run rustfmt-check, clippy, and tests
    deps:
      - rust-fmt-check
      - rust-lint
      - rust-test

  python-ext-develop:
    desc: Build and install the PyO3 extension into the venv
    deps: [venv, install, rust-toolchain]
    cmds:
      - uv run maturin develop -m bindings/python/Cargo.toml

  python-ext-wheel:
    desc: Build a wheel for the Python extension
    deps: [install, rust-toolchain]
    cmds:
      - uv run maturin build -m bindings/python/Cargo.toml --release

  python-test-ext:
    desc: Run Python tests with the Rust extension built
    deps:
      - install
      - python-ext-develop
    cmds:
      - uv run pytest

  verify:
    desc: Run Python and Rust checks and tests
    deps:
      - check
      - rust-verify
      - python-test-ext
