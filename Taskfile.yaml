---
version: '3'
env:
  UV_CACHE_DIR: '{{.ROOT_DIR}}/.cache/uv'
tasks:
  default:
    desc: List available tasks
    cmds: [task --list]
  venv:
    desc: Create virtual environment
    cmds: [uv venv --python=$(cat .python-version) --allow-existing]
  install:
    desc: Install dependencies
    cmds: [uv sync --group dev --group benchmark]
  install-docs:
    desc: Install documentation dependencies
    cmds: [uv sync --group dev --group benchmark --group docs]
  lint-check-only:
    desc: Check linting and formatting (no fixes)
    cmds:
      - >-
        uv run isort --check-only
        bindings/python/python/forestfire/_core.pyi
        benchmark
        examples/python/showcase.py
        scripts/benchmark_inference.py
        tests/python/test_train.py
        tests/python/test_sklearn_wrappers.py
      - >-
        uv run ruff check
        bindings/python
        benchmark
        examples/python
        scripts
        tests/python
      - >-
        uv run ruff format --check
        bindings/python/python/forestfire/_core.pyi
        benchmark
        examples/python/showcase.py
        scripts/benchmark_inference.py
        tests/python/test_train.py
        tests/python/test_sklearn_wrappers.py
      - uv run yamllint Taskfile.yaml .pre-commit-config.yaml .github/workflows
  lint:
    desc: Auto-fix linting and formatting issues
    cmds:
      - >-
        uv run isort
        bindings/python/python/forestfire/_core.pyi
        benchmark
        examples/python/showcase.py
        scripts/benchmark_inference.py
        tests/python/test_train.py
        tests/python/test_sklearn_wrappers.py
      - >-
        uv run ruff check --fix
        bindings/python
        benchmark
        examples/python
        scripts
        tests/python
      - >-
        uv run ruff format
        bindings/python/python/forestfire/_core.pyi
        benchmark
        examples/python/showcase.py
        scripts/benchmark_inference.py
        tests/python/test_train.py
        tests/python/test_sklearn_wrappers.py
      - uv run yamlfix Taskfile.yaml .pre-commit-config.yaml .github/workflows
      - uv run yamllint Taskfile.yaml .pre-commit-config.yaml .github/workflows
  mypy:
    desc: Run static type checks with mypy
    deps: [install]
    cmds:
      - >-
        uv run mypy . --check-untyped-defs --strict
        --config-file pyproject.toml
  setup-local-env:
    desc: Setup local environment
    cmds: [task venv, task install, uv run pre-commit install]
  clean:
    desc: Clean cache and temporary files
    cmds:
      - rm -rf .mypy_cache .pytest_cache .ruff_cache
      - find . -regex ".*/__pycache__" -exec rm -rf {} +
      - uv run pre-commit clean
      - cargo clean -p forestfire-python
  test:
    desc: Run Python tests
    deps: [python-ext-develop]
    cmds: [uv run pytest]
  python-examples:
    desc: Run Python examples
    deps: [python-ext-develop]
    cmds: [uv run python examples/python/showcase.py]
  rust-examples:
    desc: Run Rust examples
    deps: [rust-toolchain]
    cmds: [cargo run -p forestfire-rust-examples --bin showcase]
  examples:
    desc: Run Python and Rust examples
    cmds: [task python-examples, task rust-examples]
  lock-check:
    desc: Verify lock file is up-to-date
    cmds: [uv lock --locked]
  check:
    desc: Run Python checks and tests
    deps: [install]
    cmds:
      - task lock-check
      - task lint-check-only
      - task mypy
      - task test
      - task examples
  rust-toolchain:
    desc: Ensure Rust formatting and lint tools are available
    cmds:
      - |
        if ! command -v cargo >/dev/null 2>&1; then
          echo "cargo is required. Install Rust from https://rustup.rs"; exit 1;
        fi
      - cargo fmt --version >/dev/null
      - cargo clippy --version >/dev/null
  rust-fmt:
    desc: Format Rust code with rustfmt
    deps: [rust-toolchain]
    cmds: [cargo fmt --all]
  rust-fmt-check:
    desc: Check Rust formatting (no changes)
    deps: [rust-toolchain]
    cmds: [cargo fmt --all -- --check]
  rust-lint:
    desc: Run Clippy (deny warnings)
    deps: [rust-toolchain]
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings
  rust-build:
    desc: Build all Rust workspace targets
    deps: [rust-toolchain]
    cmds: [cargo build --workspace --all-targets]
  rust-test:
    desc: Run all Rust tests
    deps: [rust-toolchain]
    cmds: [cargo test --workspace --all-targets]
  rust-check:
    desc: Cargo check (type-check only)
    deps: [rust-toolchain]
    cmds: [cargo check --workspace --all-targets]
  rust-clean:
    desc: Clean Rust build artifacts
    cmds: [cargo clean]
  rust-verify:
    desc: Run rustfmt-check, clippy, and tests
    cmds: [task rust-fmt-check, task rust-lint, task rust-test]
  python-ext-develop:
    desc: Build and install the PyO3 extension into the venv
    deps: [install, rust-toolchain]
    cmds: [uv run maturin develop -m bindings/python/Cargo.toml]
  python-ext-develop-release:
    desc: >-
      Build and install the PyO3 extension into the venv with release
      optimizations
    deps: [install, rust-toolchain]
    cmds: [uv run maturin develop --release -m bindings/python/Cargo.toml]
  python-ext-wheel:
    desc: Build a wheel for the Python extension
    deps: [install, rust-toolchain]
    cmds: [uv run maturin build -m bindings/python/Cargo.toml --release]
  python-package-build:
    desc: Build PyPI-ready wheel(s) and sdist for the Python package
    deps: [install, rust-toolchain]
    cmds:
      - rm -rf dist
      - >-
        uv run maturin build
        -m bindings/python/Cargo.toml
        --release
        --sdist
        --out dist
  python-package-check:
    desc: Build the Python package and validate metadata with twine
    deps: [python-package-build]
    cmds: ["uv run --group release twine check \\\n  dist/*\n"]
  python-package-publish-testpypi:
    desc: Upload built distributions to TestPyPI with twine
    deps: [python-package-check]
    cmds:
      - |
        uv run --group release twine upload \
          --repository testpypi \
          dist/*
  python-package-publish:
    desc: Upload built distributions to PyPI with twine
    deps: [python-package-check]
    cmds: ["uv run --group release twine upload \\\n  dist/*\n"]
  docs-serve:
    desc: Serve the MkDocs documentation site locally
    deps: [install-docs]
    cmds: [uv run --group docs mkdocs serve]
  docs-build:
    desc: Build the MkDocs documentation site
    deps: [install-docs]
    cmds: [uv run --group docs mkdocs build --strict]
  python-test-ext:
    desc: Run Python tests with the Rust extension built
    cmds: [task test]
  benchmark-training:
    desc: Benchmark random-forest training over the default grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/train_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-training-micro:
    desc: Benchmark ForestFire training phases over the default micro grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/train_micro_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-training-rf:
    desc: Benchmark random-forest training over the default grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/train_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-training-micro-rf:
    desc: Benchmark random-forest training phases over the default micro grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/train_micro_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-training-gbm:
    desc: >-
      Benchmark gradient-boosting training over the default grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/train_benchmark.py
        --output-dir docs/benchmarks
        --family gradient_boosting
  benchmark-training-micro-gbm:
    desc: >-
      Benchmark gradient-boosting training phases over the default micro grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/train_micro_benchmark.py
        --output-dir docs/benchmarks
        --family gradient_boosting
  benchmark-prediction:
    desc: Benchmark random-forest prediction over the default grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/predict_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-prediction-micro:
    desc: Benchmark ForestFire prediction phases over the default micro grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/predict_micro_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-prediction-rf:
    desc: >-
      Benchmark random-forest prediction over the default grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/predict_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-prediction-micro-rf:
    desc: >-
      Benchmark random-forest prediction phases over the default micro grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/predict_micro_benchmark.py
        --output-dir docs/benchmarks
        --family random_forest
  benchmark-prediction-gbm:
    desc: >-
      Benchmark gradient-boosting prediction over the default grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/predict_benchmark.py
        --output-dir docs/benchmarks
        --family gradient_boosting
  benchmark-prediction-micro-gbm:
    desc: >-
      Benchmark gradient-boosting prediction phases over the default micro grid
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/predict_micro_benchmark.py
        --output-dir docs/benchmarks
        --family gradient_boosting
  benchmark-moons:
    desc: Benchmark make_moons probability surfaces for RF and GBM classifiers
    deps: [python-ext-develop-release]
    cmds:
      - >-
        uv run --group benchmark
        python benchmark/moons_benchmark.py
        --output-dir docs/benchmarks
  benchmark-micro:
    desc: Run ForestFire-only training and prediction micro-benchmarks
    cmds:
      - task benchmark-training-micro-rf
      - task benchmark-training-micro-gbm
      - task benchmark-prediction-micro-rf
      - task benchmark-prediction-micro-gbm
  benchmark:
    desc: Run random-forest and gradient-boosting train/predict benchmarks
    cmds:
      - task benchmark-training-rf
      - task benchmark-training-gbm
      - task benchmark-prediction-rf
      - task benchmark-prediction-gbm
  verify:
    desc: Run Python and Rust checks and tests
    cmds: [task check, task rust-verify]
