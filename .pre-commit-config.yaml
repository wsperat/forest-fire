---
minimum_pre_commit_version: 3.5.0
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: rustfmt (workspace)
        entry: cargo fmt --all
        language: system
        pass_filenames: false
        types_or: [rust]
      - id: cargo-clippy
        name: clippy (workspace, -D warnings)
        entry: >-
          bash -lc 'cargo clippy --workspace --all-targets
          --all-features -- -D warnings'
        language: system
        pass_filenames: false
        types_or: [rust]
        stages: [pre-push]
      - id: forbid-unsafe-rust
        name: forbid unsafe in Rust sources
        entry: >-
          bash -lc 'if rg -n --glob "*.rs" "\\bunsafe\\b" .; then
          echo "unsafe is forbidden in Rust sources"; exit 1; fi'
        language: system
        pass_filenames: false
        types_or: [rust]
      - id: mypy
        name: mypy
        entry: >-
          bash -lc 'uv run --with mypy mypy . --check-untyped-defs
          --strict --config-file pyproject.toml'
        language: system
        pass_filenames: false
        stages: [pre-push]
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (autofix)
        args: [--filter-files]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.12
    hooks:
      - id: ruff
        name: ruff (autofix)
        args: [--fix]
      - id: ruff-format
        name: ruff-format
  - repo: local
    hooks:
      - id: yamlfix
        name: yamlfix (autofix)
        entry: uvx yamlfix
        language: system
        files: \.(yaml|yml)$
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: check-json
